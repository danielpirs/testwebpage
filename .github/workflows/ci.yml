name: CI – Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: build the React webapp and upload it as an artifact
  # ──────────────────────────────────────────────────────────────
  build-webapp:
    name: Build React Webapp
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Build webapp
        working-directory: webapp
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: webapp-dist
          path: webapp/dist
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Job 2: run Cucumber + Playwright tests against Chrome
  # ──────────────────────────────────────────────────────────────
  test-chrome:
    name: Cucumber Tests (Chrome)
    runs-on: ubuntu-latest
    needs: build-webapp
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            webapp/package-lock.json
            tests/package-lock.json

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Start webapp dev server
        working-directory: webapp
        run: npm run dev -- --port 5173 &

      - name: Wait for webapp to be ready
        run: |
          echo "Waiting for webapp on http://localhost:5173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Webapp is ready!"
              break
            fi
            echo "Attempt $i/30 – waiting..."
            sleep 2
          done

      - name: Run Cucumber tests (Chrome)
        working-directory: tests
        env:
          BROWSER: chrome
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cucumber-report-chrome
          path: tests/reports/cucumber-report.html
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Job 3: run Cucumber + Playwright tests against Lightpanda
  # ──────────────────────────────────────────────────────────────
  test-lightpanda:
    name: Cucumber Tests (Lightpanda)
    runs-on: ubuntu-latest
    needs: build-webapp
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            webapp/package-lock.json
            tests/package-lock.json

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Download Lightpanda browser
        run: |
          curl -L -o /usr/local/bin/lightpanda \
            https://github.com/lightpanda-io/browser/releases/latest/download/lightpanda-x86_64-linux
          chmod +x /usr/local/bin/lightpanda

      - name: Start webapp dev server
        working-directory: webapp
        run: npm run dev -- --port 5173 &

      - name: Wait for webapp to be ready
        run: |
          echo "Waiting for webapp on http://localhost:5173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Webapp is ready!"
              break
            fi
            echo "Attempt $i/30 – waiting..."
            sleep 2
          done

      - name: Start Lightpanda browser (CDP on port 9222)
        run: lightpanda serve --host 127.0.0.1 --port 9222 &

      - name: Wait for Lightpanda CDP to be ready
        run: |
          echo "Waiting for Lightpanda on port 9222..."
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:9222/json/version > /dev/null 2>&1; then
              echo "Lightpanda is ready!"
              break
            fi
            echo "Attempt $i/20 – waiting..."
            sleep 2
          done

      - name: Run Cucumber tests (Lightpanda)
        working-directory: tests
        env:
          BROWSER: lightpanda
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cucumber-report-lightpanda
          path: tests/reports/cucumber-report.html
          if-no-files-found: ignore
